name: om_natalie
description: "Om Natalie - Social Connection App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.0
  device_info_plus: ^10.1.0
  google_fonts: ^6.2.1
  video_player: ^2.9.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Icon-Natalie/Icon-Natalie.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/natalie/
    - assets/Video/
    - assets/Image/
