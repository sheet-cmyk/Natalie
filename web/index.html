<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="لقاء LIQAA - تطبيق التواصل الاجتماعي">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="لقاء LIQAA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>لقاء LIQAA</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Unregister any stale service workers from previous builds
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var hadWorker = false;
        regs.forEach(function(r) { r.unregister(); hadWorker = true; });
        if (hadWorker) { window.location.reload(true); }
      });
    }

    // Auto-reload when a new build is deployed
    (function() {
      var _snapshot = null;
      function checkForUpdate() {
        fetch('/flutter_bootstrap.js?_=' + Date.now(), { cache: 'no-store' })
          .then(function(r) { return r.text(); })
          .then(function(body) {
            if (_snapshot === null) { _snapshot = body; return; }
            if (_snapshot !== body) { window.location.reload(true); }
          }).catch(function() {});
      }
      // Check on load, every 60 seconds, and when user returns to the tab
      checkForUpdate();
      setInterval(checkForUpdate, 60000);
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') checkForUpdate();
      });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
